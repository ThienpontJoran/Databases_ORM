services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bird_api
    volumes:
      - db:/var/lib/postgresql

volumes:
  db:


  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080